name: Build Desktop Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: '3.14'
            artifact_name: PhotoSort-Windows-x64
            requirements_file: requirements.txt
            max_artifact_mb: 500
          - os: windows-latest
            python: '3.14'
            artifact_name: PhotoSort-Windows-x64-CUDA
            requirements_file: requirements-cuda.txt
            max_artifact_mb: 750
          - os: macos-14
            python: '3.14'
            artifact_name: PhotoSort-macOS-AppleSilicon
            requirements_file: requirements.txt
            max_artifact_mb: 450

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      PIP_NO_PYTHON_VERSION_WARNING: '1'
      PIP_PROGRESS_BAR: 'off'
      QT_QPA_PLATFORM: offscreen
      PHOTOSORT_ENABLE_FILE_LOGGING: 'false'

      # CI-only regression guard: fail the packaging job if the frozen app takes
      # more than 30 seconds to start. This does not affect production users or
      # impose a runtime timeout inside PhotoSort.
      PHOTOSORT_STARTUP_BUDGET_SECONDS: '30'

      # I currently publish unsigned ZIP/DMG artifacts and intentionally leave
      # these secrets unset. The conditional signing and notarization steps are
      # skipped automatically. In the future I may configure trusted signing here later if the
      # a lot of people think it's necessary; for now,
      # I don't want to pay for a code signing certificate or Apple Developer account.
      WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Generate version module
        shell: bash
        run: |
          python - <<'PY'
          import os, re, pathlib
          ref = os.getenv('GITHUB_REF', '') or ''
          sha = (os.getenv('GITHUB_SHA', '') or '')[:7]
          match = re.match(r'refs/tags/v?(.*)$', ref)
          version = match.group(1) if match and match.group(1) else (f'dev-{sha}' if sha else 'dev')
          path = pathlib.Path('src/core/build_info.py')
          path.write_text('# File auto-generated by CI. Do not edit.\nVERSION = ' + repr(version) + '\n', encoding='utf-8')
          print(f'Building PhotoSort {version}')
          PY

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.requirements_file }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.requirements_file }}-pip-
            ${{ runner.os }}-pip-

      - name: Install pinned dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "${{ matrix.requirements_file }}" -r requirements-build.txt
          set +e
          python -m pip check 2>&1 | tee pip-check.txt
          pip_check_status=${PIPESTATUS[0]}
          set -e
          if [[ $pip_check_status -ne 0 ]]; then
            # MediaPipe 0.10.21 ships a universal2 binary with x86_64-only wheel
            # metadata, so pip reports it unsupported on Apple Silicon even though
            # both architectures are present and the import succeeds.
            sed '/^mediapipe 0.10.21 is not supported on this platform$/d' pip-check.txt > pip-check-unexpected.txt
            test ! -s pip-check-unexpected.txt
          fi
          python -m pip freeze --all > build-environment.txt

      - name: Verify ONNX Runtime variant
        shell: bash
        run: |
          python - <<'PY'
          import importlib.metadata as metadata
          import onnxruntime

          expected = 'onnxruntime-gpu' if '${{ matrix.requirements_file }}' == 'requirements-cuda.txt' else 'onnxruntime'
          installed = {dist.metadata['Name'].lower() for dist in metadata.distributions()}
          assert expected in installed, f'Missing expected distribution: {expected}'
          conflicting = 'onnxruntime' if expected == 'onnxruntime-gpu' else 'onnxruntime-gpu'
          assert conflicting not in installed, f'Conflicting ONNX Runtime distribution installed: {conflicting}'
          print('ONNX Runtime', onnxruntime.__version__, onnxruntime.get_available_providers())
          PY

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p build/icons/PhotoSort.iconset
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          base = Image.open('assets/app_icon.png')
          iconset = Path('build/icons/PhotoSort.iconset')
          sizes = {
              'icon_16x16.png': 16, 'icon_16x16@2x.png': 32,
              'icon_32x32.png': 32, 'icon_32x32@2x.png': 64,
              'icon_128x128.png': 128, 'icon_128x128@2x.png': 256,
              'icon_256x256.png': 256, 'icon_256x256@2x.png': 512,
              'icon_512x512.png': 512, 'icon_512x512@2x.png': 1024,
          }
          for name, size in sizes.items():
              base.resize((size, size), Image.Resampling.LANCZOS).save(iconset / name)
          PY
          iconutil -c icns build/icons/PhotoSort.iconset -o assets/photosort.icns

      - name: Install pyexiv2 runtime libraries
        if: runner.os == 'macOS'
        run: brew install brotli inih gettext

      - name: Build from authoritative spec
        shell: bash
        run: pyinstaller --clean --noconfirm PhotoSort.spec

      - name: Upload PyInstaller diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pyinstaller-diagnostics-${{ matrix.artifact_name }}
          path: |
            build/PhotoSort/warn-PhotoSort.txt
            build/PhotoSort/xref-PhotoSort.html
            build-environment.txt
            pip-check.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Sign Windows executable
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_PFX != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP 'photosort-signing.pfx'
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $certificate /p $env:WINDOWS_CERTIFICATE_PASSWORD 'dist\PhotoSort\PhotoSort.exe'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & signtool verify /pa 'dist\PhotoSort\PhotoSort.exe'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Remove-Item $certificate -Force

      - name: Sign macOS application
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE_P12 != ''
        shell: bash
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/photosort-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/photosort-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p photosort-ci "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p photosort-ci "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k photosort-ci "$KEYCHAIN_PATH"
          codesign --force --deep --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" dist/PhotoSort.app
          codesign --verify --deep --strict --verbose=2 dist/PhotoSort.app

      - name: Exercise packaged Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = (Resolve-Path 'dist\PhotoSort\PhotoSort.exe').Path
          $env:PHOTOSORT_PACKAGING_SMOKE_REPORT = Join-Path $env:RUNNER_TEMP 'packaging-smoke.json'
          $env:PHOTOSORT_CACHE_ROOT = Join-Path $env:RUNNER_TEMP 'photosort-cache'
          $env:PHOTOSORT_DATA_ROOT = Join-Path $env:RUNNER_TEMP 'photosort-data'

          function Invoke-CheckedProcess([string[]] $Arguments, [int] $TimeoutSeconds) {
            $timer = [Diagnostics.Stopwatch]::StartNew()
            $process = Start-Process -FilePath $exe -ArgumentList $Arguments -PassThru
            if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
              $process.Kill($true)
              throw "PhotoSort timed out after $TimeoutSeconds seconds: $Arguments"
            }
            $timer.Stop()
            if ($process.ExitCode -ne 0) {
              throw "PhotoSort exited with code $($process.ExitCode): $Arguments"
            }
            return $timer.Elapsed.TotalSeconds
          }

          Invoke-CheckedProcess @('--packaging-smoke-test') 60 | Out-Null
          $report = Get-Content $env:PHOTOSORT_PACKAGING_SMOKE_REPORT -Raw | ConvertFrom-Json
          if (-not $report.ok) { throw "Packaging imports failed: $($report.failures -join ', ')" }
          $startupSeconds = Invoke-CheckedProcess @('--smoke-test', '--smoke-delay-ms', '1500') 60
          Write-Output "Packaged startup smoke: $([math]::Round($startupSeconds, 2)) seconds"
          if ($startupSeconds -gt [double]$env:PHOTOSORT_STARTUP_BUDGET_SECONDS) {
            throw "Packaged startup exceeded budget: $startupSeconds seconds"
          }

      - name: Exercise packaged macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          export PHOTOSORT_PACKAGING_SMOKE_REPORT="$RUNNER_TEMP/packaging-smoke.json"
          export PHOTOSORT_CACHE_ROOT="$RUNNER_TEMP/photosort-cache"
          export PHOTOSORT_DATA_ROOT="$RUNNER_TEMP/photosort-data"
          python - <<'PY'
          import json, os, subprocess, time

          binary = 'dist/PhotoSort.app/Contents/MacOS/PhotoSort'
          subprocess.run([binary, '--packaging-smoke-test'], check=True, timeout=60)
          with open(os.environ['PHOTOSORT_PACKAGING_SMOKE_REPORT'], encoding='utf-8') as handle:
              report = json.load(handle)
          if not report['ok']:
              raise SystemExit(f"Packaging imports failed: {report['failures']}")
          started = time.perf_counter()
          subprocess.run([binary, '--smoke-test', '--smoke-delay-ms', '1500'], check=True, timeout=60)
          elapsed = time.perf_counter() - started
          print(f'Packaged startup smoke: {elapsed:.2f} seconds')
          budget = float(os.environ['PHOTOSORT_STARTUP_BUDGET_SECONDS'])
          if elapsed > budget:
              raise SystemExit(f'Packaged startup exceeded {budget:.1f}s budget: {elapsed:.2f}s')
          PY

      - name: Package Windows one-folder build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = '${{ matrix.artifact_name }}.zip'
          Compress-Archive -Path 'dist\PhotoSort\*' -DestinationPath $archive -CompressionLevel Optimal
          $sizeMb = (Get-Item $archive).Length / 1MB
          Write-Output "Artifact size: $([math]::Round($sizeMb, 2)) MB"
          if ($sizeMb -gt ${{ matrix.max_artifact_mb }}) {
            throw "Artifact exceeds ${{ matrix.max_artifact_mb }} MB budget"
          }
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "$archive.sha256"

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install create-dmg
          DMG="${{ matrix.artifact_name }}.dmg"
          rm -rf dmg_staging "$DMG"
          mkdir dmg_staging
          cp -R dist/PhotoSort.app dmg_staging/
          set +e
          create-dmg \
            --volname PhotoSort \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon PhotoSort.app 150 190 \
            --hide-extension PhotoSort.app \
            --app-drop-link 450 190 \
            "$DMG" dmg_staging
          status=$?
          set -e
          if [[ $status -ne 0 && $status -ne 2 ]]; then exit "$status"; fi
          test -f "$DMG"
          rm -rf dmg_staging

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        shell: bash
        run: |
          set -euo pipefail
          DMG="${{ matrix.artifact_name }}.dmg"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Validate macOS artifact budget and checksum
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          artifact = Path('${{ matrix.artifact_name }}.dmg')
          size_mb = artifact.stat().st_size / (1024 * 1024)
          print(f'Artifact size: {size_mb:.2f} MB')
          if size_mb > ${{ matrix.max_artifact_mb }}:
              raise SystemExit('Artifact exceeds ${{ matrix.max_artifact_mb }} MB budget')
          PY
          shasum -a 256 "${{ matrix.artifact_name }}.dmg" > "${{ matrix.artifact_name }}.dmg.sha256"

      - name: Archive release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.zip.sha256
            ${{ matrix.artifact_name }}.dmg
            ${{ matrix.artifact_name }}.dmg.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifacts for release
        shell: bash
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.sha256' \) -exec cp {} release_files/ \;
          test -n "$(find release_files -type f -print -quit)"
          ls -lh release_files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    uses: ./.github/workflows/release-notes-generator.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
